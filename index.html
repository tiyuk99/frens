<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get to know my frens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="scanline-overlay" aria-hidden="true"></div>
  <div id="heart-container" class="heart-container" aria-hidden="true"></div>

  <div class="page">
    <header class="header">
      <span class="deco deco-left">★</span>
      <h1 class="title">Get to know my frens</h1>
      <span class="deco deco-right">♥</span>
      <button type="button" id="btn-mute" class="btn-mute" aria-label="Toggle sound" title="Sound on/off">
        <span class="mute-icon mute-icon--on">🔊</span>
        <span class="mute-icon mute-icon--off">🔇</span>
      </button>
    </header>

    <main class="main">
      <section class="window-panel window-panel--game">
        <span class="corner corner--tl" aria-hidden="true"></span>
        <span class="corner corner--tr" aria-hidden="true"></span>
        <span class="corner corner--bl" aria-hidden="true"></span>
        <span class="corner corner--br" aria-hidden="true"></span>
        <div class="window-title-bar">Questionnaire</div>

        <div class="progress-block">
          <div id="dog-container" class="dog-container">
            <div id="progress-dog" class="progress-dog" aria-hidden="true">
              <span class="progress-dog__body"></span>
            </div>
          </div>
          <p id="progress-text" class="progress-text">Question 1 of 7</p>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>

        <div id="step-content" class="step-content"></div>

        <div class="step-actions">
          <button type="button" id="btn-back" class="btn btn-secondary" hidden>Back</button>
          <button type="button" id="btn-next" class="btn btn-primary">Next</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span class="sparkle">✦</span> made with pixels <span class="sparkle">✦</span>
    </footer>
  </div>

  <audio id="sound-click" preload="auto">
    <!-- Optional: add src="click.mp3" for click sound -->
  </audio>
  <audio id="sound-success" preload="auto">
    <!-- Optional: add src="success.mp3" for success sound -->
  </audio>

  <script src="script.js" defer></script>
</body>
</html>
